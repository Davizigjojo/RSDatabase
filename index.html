<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlazerCloud - File Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #050a15; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-blue { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.2s; }
        .hidden { display: none; }
        .modal-bg { background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="min-h-screen">

    <!-- LOGIN -->
    <div id="login-screen" class="fixed inset-0 flex items-center justify-center px-4 z-50 bg-[#050a15]">
        <div class="glass p-8 rounded-[2rem] w-full max-w-md shadow-2xl border border-blue-500/20">
            <h1 class="text-3xl font-extrabold text-white text-center mb-8 italic">BLAZER<span class="text-blue-500">CLOUD</span></h1>
            <div class="space-y-4">
                <input type="text" id="user" placeholder="Usuário" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="pass" placeholder="Senha" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="fazerLogin()" class="w-full py-4 btn-blue text-white font-bold rounded-2xl shadow-lg shadow-blue-500/20">Entrar</button>
            </div>
        </div>
    </div>

    <!-- MAIN PANEL -->
    <div id="main-content" class="hidden max-w-2xl mx-auto px-4 py-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black italic">BLAZER<span class="text-blue-500">CLOUD</span></h1>
            <button onclick="logout()" class="text-slate-500 text-xs font-bold uppercase tracking-widest">Sair</button>
        </header>

        <!-- Upload -->
        <div class="glass p-6 rounded-[2rem] mb-8">
            <label class="border-2 border-dashed border-slate-800 rounded-2xl p-8 flex flex-col items-center cursor-pointer hover:border-blue-500 bg-slate-900/30">
                <i class="fas fa-file-zipper text-3xl mb-2 text-slate-600"></i>
                <span id="label-text" class="text-xs font-semibold text-slate-400">Selecionar arquivo</span>
                <input type="file" id="file-input" class="hidden" accept=".zip" onchange="document.getElementById('label-text').innerText=this.files[0].name">
            </label>
            <button onclick="upload()" class="w-full mt-4 py-4 btn-blue text-white font-bold rounded-2xl">Fazer Upload</button>
        </div>

        <div id="file-list" class="space-y-3"></div>
    </div>

    <!-- MODAL DE VISUALIZAÇÃO DE CONTEÚDO -->
    <div id="zip-modal" class="hidden fixed inset-0 z-[60] modal-bg p-4 flex items-center justify-center">
        <div class="glass w-full max-w-lg rounded-[2.5rem] overflow-hidden flex flex-col max-h-[80vh]">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                <div>
                    <h3 id="modal-title" class="font-bold text-blue-400">Arquivo.zip</h3>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest">Conteúdo Interno</p>
                </div>
                <button onclick="fecharModal()" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center hover:bg-red-500/20 text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            <div id="modal-body" class="flex-1 overflow-y-auto p-6 space-y-2">
                <!-- Conteúdo do ZIP será inserido aqui -->
            </div>
        </div>
    </div>

    <script>
        const PROXY = "https://cors-anywhere.herokuapp.com/";
        const API = "http://blazercraft.falixsrv.me:57488";
        let TOKEN = localStorage.getItem('blazer_token');

        async function fazerLogin() {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            const res = await fetch(PROXY + API + "/login", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            if (data.token) {
                TOKEN = data.token;
                localStorage.setItem('blazer_token', TOKEN);
                iniciar();
            } else alert("Erro no login");
        }

        function iniciar() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            listarArquivos();
        }

        function logout() { localStorage.removeItem('blazer_token'); location.reload(); }

        async function listarArquivos() {
            const list = document.getElementById('file-list');
            const res = await fetch(PROXY + API + "/arquivos", { headers: {'x-access-token': TOKEN} });
            const dados = await res.json();
            list.innerHTML = '';
            dados.forEach(f => {
                const div = document.createElement('div');
                div.className = "glass p-4 rounded-3xl flex items-center justify-between";
                div.innerHTML = `
                    <div class="flex items-center gap-4 cursor-pointer flex-1" onclick="verConteudo('${f[0]}')">
                        <div class="w-10 h-10 bg-blue-500/10 rounded-xl flex items-center justify-center text-blue-400"><i class="fas fa-folder-open"></i></div>
                        <div>
                            <h4 class="text-sm font-bold">${f[0]}</h4>
                            <p class="text-[10px] text-slate-500">${f[1]} KB • Ver interior</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <a href="${API}/download/${f[0]}" class="p-3 text-blue-400 hover:bg-white/5 rounded-xl"><i class="fas fa-download"></i></a>
                        <button onclick="deletar('${f[0]}')" class="p-3 text-red-400 hover:bg-white/5 rounded-xl"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function verConteudo(nome) {
            const modal = document.getElementById('zip-modal');
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = nome;
            
            modal.classList.remove('hidden');
            body.innerHTML = '<div class="text-center py-10 animate-pulse text-slate-500 text-sm italic">Lendo interior do arquivo...</div>';

            try {
                const res = await fetch(PROXY + API + "/arquivos/conteudo/" + encodeURIComponent(nome), {
                    headers: {'x-access-token': TOKEN}
                });
                const itens = await res.json();
                body.innerHTML = '';
                
                itens.forEach(item => {
                    const icon = item.pasta ? 'fa-folder text-amber-500' : 'fa-file text-slate-400';
                    const div = document.createElement('div');
                    div.className = "flex items-center justify-between p-3 bg-white/5 rounded-xl border border-white/5 hover:bg-white/10 transition-all";
                    div.innerHTML = `
                        <div class="flex items-center gap-3 truncate">
                            <i class="fas ${icon} text-xs"></i>
                            <span class="text-xs font-medium text-slate-300 truncate">${item.nome}</span>
                        </div>
                        <span class="text-[9px] text-slate-600 font-mono">${(item.tamanho/1024).toFixed(1)} KB</span>
                    `;
                    body.appendChild(div);
                });
            } catch (e) { body.innerHTML = '<p class="text-red-500 text-xs text-center">Erro ao ler ZIP.</p>'; }
        }

        function fecharModal() { document.getElementById('zip-modal').classList.add('hidden'); }

        async function upload() {
            const input = document.getElementById('file-input');
            const formData = new FormData();
            formData.append('arquivo', input.files[0]);
            await fetch(PROXY + API + "/upload", { method: 'POST', headers: {'x-access-token': TOKEN}, body: formData });
            location.reload();
        }

        async function deletar(n) { if(confirm('Apagar?')) { await fetch(PROXY + API + "/arquivos/"+encodeURIComponent(n), { method:'DELETE', headers:{'x-access-token': TOKEN} }); listarArquivos(); } }

        if (TOKEN) iniciar();
    </script>
</body>
</html>
