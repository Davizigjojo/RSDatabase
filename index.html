<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlazerCloud - Entrar ou Criar Conta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #050a15; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-blue { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.2s; }
        .btn-blue:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px #3b82f6; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <!-- TELA DE LOGIN / REGISTRO -->
    <div id="login-screen" class="fixed inset-0 flex items-center justify-center px-4 z-50 bg-[#050a15]">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl border border-blue-500/20 text-center">
            <h1 class="text-4xl font-extrabold text-white mb-2 italic">BLAZER<span class="text-blue-500">CLOUD</span></h1>
            <p id="auth-title" class="text-slate-500 text-sm mb-8">Acesse sua conta</p>
            
            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="text" id="user" placeholder="Usuário" class="w-full bg-slate-900 border border-slate-800 p-4 pl-12 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-white">
                </div>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="password" id="pass" placeholder="Senha" class="w-full bg-slate-900 border border-slate-800 p-4 pl-12 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-white">
                </div>
                
                <button id="btn-action" onclick="fazerLogin()" class="w-full py-4 btn-blue text-white font-bold rounded-2xl shadow-lg transition-all">Entrar no Sistema</button>
                
                <div class="pt-4 border-t border-slate-800">
                    <p class="text-xs text-slate-500 mb-4" id="toggle-text">Ainda não tem uma conta?</p>
                    <button onclick="toggleAuth()" id="btn-toggle" class="text-blue-400 font-bold text-sm hover:underline">Criar Nova Conta</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PAINEL PRINCIPAL (O RESTANTE DO CÓDIGO PERMANECE IGUAL) -->
    <div id="main-content" class="hidden max-w-3xl mx-auto px-4 pt-8">
        <!-- ... (Código do Header, Upload e Lista de Arquivos que já te passei antes) ... -->
        <header class="flex justify-between items-center mb-10">
            <div><h1 class="text-3xl font-black italic">BLAZER<span class="text-blue-500">CLOUD</span></h1></div>
            <button onclick="logout()" class="w-10 h-10 rounded-full bg-red-500/10 text-red-500 flex items-center justify-center"><i class="fas fa-power-off"></i></button>
        </header>

        <section class="glass p-6 rounded-[2.5rem] mb-10 border border-white/5">
            <input type="file" id="file-input" class="hidden" accept=".zip" onchange="document.getElementById('lt').innerText = this.files[0].name">
            <label for="file-input" id="lt" class="block w-full border-2 border-dashed border-slate-800 rounded-2xl p-6 text-center cursor-pointer mb-4 text-slate-500 font-bold">Selecionar ZIP</label>
            <textarea id="file-desc" placeholder="Descrição do arquivo..." class="w-full bg-slate-900 p-4 rounded-2xl mb-4 text-sm outline-none border border-slate-800 h-24"></textarea>
            <button onclick="upload()" class="w-full py-4 btn-blue text-white font-bold rounded-2xl">Enviar Arquivo</button>
        </section>

        <div id="file-list" class="space-y-4"></div>
    </div>

    <script>
        const PROXY = "https://cors-anywhere.herokuapp.com/";
        const API = "http://blazercraft.falixsrv.me:57488";
        let isRegisterMode = false;

        function toggleAuth() {
            isRegisterMode = !isRegisterMode;
            const title = document.getElementById('auth-title');
            const btnAction = document.getElementById('btn-action');
            const btnToggle = document.getElementById('btn-toggle');
            const toggleText = document.getElementById('toggle-text');

            if(isRegisterMode) {
                title.innerText = "Crie sua conta gratuita";
                btnAction.innerText = "Cadastrar Agora";
                btnAction.setAttribute('onclick', 'registrar()');
                btnToggle.innerText = "Já tenho uma conta";
                toggleText.innerText = "Já é membro?";
            } else {
                title.innerText = "Acesse sua conta";
                btnAction.innerText = "Entrar no Sistema";
                btnAction.setAttribute('onclick', 'fazerLogin()');
                btnToggle.innerText = "Criar Nova Conta";
                toggleText.innerText = "Ainda não tem uma conta?";
            }
        }

        async function registrar() {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            if(!username || !password) return alert("Preencha todos os campos");

            try {
                const res = await fetch(PROXY + API + "/register", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if(res.ok) {
                    alert("Conta criada! Agora faça o login.");
                    toggleAuth();
                } else {
                    alert(data.erro || "Erro ao registrar");
                }
            } catch (e) { alert("Erro de conexão"); }
        }

        async function fazerLogin() {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            try {
                const res = await fetch(PROXY + API + "/login", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('blazer_token', data.token);
                    location.reload();
                } else alert("Usuário ou senha incorretos");
            } catch (e) { alert("Erro de conexão"); }
        }

        // Função para carregar arquivos (mesma do anterior)
        async function listarArquivos() {
            const token = localStorage.getItem('blazer_token');
            const list = document.getElementById('file-list');
            try {
                const res = await fetch(PROXY + API + "/arquivos", { headers: {'x-access-token': token} });
                const dados = await res.json();
                list.innerHTML = '';
                dados.forEach(f => {
                    const div = document.createElement('div');
                    div.className = "glass p-5 rounded-[2rem] flex justify-between items-center";
                    div.innerHTML = `<div class="flex-1">
                        <h4 class="font-bold text-white">${f[0]}</h4>
                        <p class="text-[10px] text-slate-500 italic">${f[3]}</p>
                    </div>
                    <div class="flex gap-2">
                        <a href="${API}/download/${f[0]}" class="p-3 bg-blue-500 rounded-xl text-xs font-bold">Baixar</a>
                        <button onclick="deletar('${f[0]}')" class="p-3 bg-red-500 rounded-xl text-xs font-bold"><i class="fas fa-trash"></i></button>
                    </div>`;
                    list.appendChild(div);
                });
            } catch (e) {}
        }

        async function upload() {
            const input = document.getElementById('file-input');
            const desc = document.getElementById('file-desc').value;
            const token = localStorage.getItem('blazer_token');
            const formData = new FormData();
            formData.append('arquivo', input.files[0]);
            formData.append('descricao', desc);
            await fetch(PROXY + API + "/upload", { method: 'POST', headers: {'x-access-token': token}, body: formData });
            location.reload();
        }

        async function deletar(n) {
            const token = localStorage.getItem('blazer_token');
            await fetch(PROXY + API + "/arquivos/"+n, { method:'DELETE', headers:{'x-access-token': token} });
            listarArquivos();
        }

        function logout() { localStorage.removeItem('blazer_token'); location.reload(); }

        window.onload = () => {
            if(localStorage.getItem('blazer_token')) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                listarArquivos();
            }
        }
    </script>
</body>
</html>
