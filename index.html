<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blazercraft - Painel de Controle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4); }
        input { background: rgba(15, 23, 42, 0.6) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
    </style>
</head>
<body class="min-h-screen p-4">

    <div class="max-w-4xl mx-auto">
        <!-- Cabeçalho -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4 mt-6">
            <div>
                <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">
                    BLAZERCRAFT
                </h1>
                <p class="text-slate-400 font-medium">Cloud Files Management System</p>
            </div>
            <div class="flex gap-2">
                <button onclick="carregarArquivos()" class="btn-primary text-white px-5 py-2.5 rounded-xl flex items-center gap-2 shadow-lg">
                    <i class="fas fa-sync-alt" id="refresh-icon"></i> Atualizar
                </button>
            </div>
        </header>

        <!-- Formulário de Teste (Inserir dade) -->
        <section class="glass p-6 rounded-2xl mb-8">
            <h2 class="text-xl font-bold mb-4 text-blue-300"><i class="fas fa-plus-circle mr-2"></i>Adicionar Arquivo de Teste</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="nome-arq" placeholder="Nome do Arquivo" class="p-3 rounded-lg outline-none">
                <input type="text" id="desc-arq" placeholder="Descrição" class="p-3 rounded-lg outline-none">
                <button onclick="enviarArquivo()" id="btn-enviar" class="md:col-span-2 bg-emerald-600 hover:bg-emerald-500 text-white font-bold p-3 rounded-lg transition-all">
                    Gravar no Banco de Dados
                </button>
            </div>
        </section>

        <!-- Status / Erros -->
        <div id="status-card" class="mb-6 p-4 rounded-xl glass hidden border-l-4 border-yellow-500">
            <p id="status-msg" class="text-sm"></p>
        </div>

        <!-- Lista de Arquivos -->
        <div class="glass rounded-2xl overflow-hidden shadow-2xl border border-white/5">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-slate-400">
                        <tr>
                            <th class="p-4 font-semibold italic">Documento</th>
                            <th class="p-4 font-semibold italic text-center">Tamanho</th>
                            <th class="p-4 font-semibold italic">Data</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo" class="divide-y divide-white/5">
                        <tr>
                            <td colspan="3" class="p-12 text-center text-slate-500">
                                <i class="fas fa-circle-notch fa-spin text-3xl mb-3 block text-blue-500"></i>
                                Aguardando resposta do servidor...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <footer class="mt-12 text-center text-slate-600 text-xs">
            <p>Conexão Direta: <span class="text-slate-400">blazercraft.falixsrv.me</span></p>
            <p class="mt-1">Powered by PostgreSQL & Python Flask</p>
        </footer>
    </div>

    <script>
        // SOLUÇÃO PARA O ERRO HTTPS/HTTP:
        // Usamos um proxy que aceita HTTPS e repassa para o seu HTTP
        const PROXY = "https://cors-anywhere.herokuapp.com/";
        const REAL_API = "http://blazercraft.falixsrv.me:57488/arquivos";
        
        // Tentamos primeiro a direta, se falhar usamos o proxy
        let API_URL = REAL_API;

        async function carregarArquivos() {
            const icon = document.getElementById('refresh-icon');
            const tabela = document.getElementById('tabela-corpo');
            const statusCard = document.getElementById('status-card');
            
            icon.classList.add('fa-spin');
            
            try {
                // Tentativa de fetch
                let response = await fetch(API_URL);
                
                // Se o navegador bloquear por Mixed Content, ele nem chega aqui.
                // Então, se falhar, tentamos via Proxy na segunda vez automaticamente.
                if (!response.ok) throw new Error();

                const dados = await response.json();
                renderizarTabela(dados);
                statusCard.classList.add('hidden');
            } catch (error) {
                console.warn("Tentando via Proxy Seguro...");
                try {
                    // SEGUNDA TENTATIVA: VIA PROXY
                    const proxyResponse = await fetch(PROXY + REAL_API);
                    if(proxyResponse.status === 403) {
                        mostrarErroProxy();
                    }
                    const dados = await proxyResponse.json();
                    renderizarTabela(dados);
                } catch (e) {
                    mostrarErroGeral();
                }
            } finally {
                icon.classList.remove('fa-spin');
            }
        }

        function renderizarTabela(dados) {
            const tabela = document.getElementById('tabela-corpo');
            tabela.innerHTML = '';
            if (dados.length === 0) {
                tabela.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-slate-500">Banco de dados vazio.</td></tr>`;
                return;
            }
            dados.forEach(arq => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-white/5 transition-colors";
                tr.innerHTML = `
                    <td class="p-4 font-medium text-blue-100">
                        <div class="flex flex-col">
                            <span class="flex items-center"><i class="far fa-file-code mr-2 text-blue-400"></i>${arq[0]}</span>
                            <span class="text-[10px] text-slate-500 ml-6">${arq[3] || 'Sem descrição'}</span>
                        </div>
                    </td>
                    <td class="p-4 text-center text-slate-400 font-mono text-sm">${arq[1]} KB</td>
                    <td class="p-4 text-slate-500 text-xs">${arq[2]}</td>
                `;
                tabela.appendChild(tr);
            });
        }

        async function enviarArquivo() {
            const nome = document.getElementById('nome-arq').value;
            const desc = document.getElementById('desc-arq').value;
            const btn = document.getElementById('btn-enviar');

            if(!nome) return alert("Digite um nome!");

            btn.disabled = true;
            btn.innerHTML = "Gravando...";

            const payload = {
                nome: nome,
                tamanho: Math.floor(Math.random() * 1000),
                data: new Date().toLocaleString(),
                descricao: desc
            };

            try {
                // Tenta enviar (via proxy para evitar erro de segurança)
                await fetch(PROXY + REAL_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                alert("Gravado com sucesso no PostgreSQL!");
                document.getElementById('nome-arq').value = "";
                document.getElementById('desc-arq').value = "";
                carregarArquivos();
            } catch (e) {
                alert("Erro ao gravar. Verifique se o servidor Falix está ligado.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Gravar no Banco de Dados";
            }
        }

        function mostrarErroProxy() {
            const statusCard = document.getElementById('status-card');
            statusCard.classList.remove('hidden');
            document.getElementById('status-msg').innerHTML = `
                <b class="text-yellow-400">Atenção:</b> Você precisa ativar o acesso ao Proxy temporário.<br>
                1. Clique aqui: <a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank" class="underline text-blue-400">Ativar Acesso Temporário</a><br>
                2. Clique no botão "Request temporary access to the demo server".<br>
                3. Volte aqui e atualize a página.
            `;
        }

        function mostrarErroGeral() {
            const tabela = document.getElementById('tabela-corpo');
            tabela.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-red-400">Não foi possível conectar ao servidor. Verifique se a FalixNodes está ONLINE.</td></tr>`;
        }

        window.onload = carregarArquivos;
    </script>
</body>
</html>
