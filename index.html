<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlazerCloud - Nuvem Pessoal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0d0f17; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .accent-blue { background: #3b82f6; }
        .progress-bar { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- TELA DE LOGIN -->
    <div id="auth-screen" class="flex items-center justify-center min-h-screen p-4">
        <div class="w-full max-w-md glass-card p-8 rounded-3xl shadow-2xl">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-black tracking-tighter text-blue-500 italic">BLAZER<span class="text-white">CLOUD</span></h1>
                <p class="text-slate-400 text-sm mt-1">Sua conta de armazenamento seguro</p>
            </div>
            
            <div class="space-y-5">
                <div>
                    <input type="text" id="user" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Usuário">
                </div>
                <div>
                    <input type="password" id="pass" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Senha">
                </div>
                <button onclick="fazerLogin()" id="btn-login" class="w-full accent-blue py-4 rounded-2xl font-bold text-lg hover:brightness-110 active:scale-95 transition-all">ENTRAR</button>
                <button onclick="fazerRegistro()" class="w-full text-slate-400 text-sm hover:text-white transition-colors">Ainda não tem conta? <span class="text-blue-500 font-bold">Criar agora</span></button>
            </div>
            <p id="auth-msg" class="text-center mt-6 text-sm"></p>
        </div>
    </div>

    <!-- PAINEL DO USUÁRIO -->
    <div id="main-screen" class="hidden animate-in fade-in duration-500">
        <header class="p-6 flex justify-between items-center max-w-5xl mx-auto">
            <h2 class="text-xl font-black text-blue-500 italic">BLAZER<span class="text-white">CLOUD</span></h2>
            <button onclick="sair()" class="text-slate-400 hover:text-red-400 text-sm font-bold flex items-center gap-2">
                SAIR <i class="fas fa-sign-out-alt"></i>
            </button>
        </header>

        <main class="max-w-xl mx-auto px-6">
            <!-- Card de Armazenamento -->
            <div class="glass-card rounded-3xl p-6 mb-8 border-b-4 border-blue-500">
                <div class="flex justify-between items-end mb-3">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Espaço Utilizado</p>
                    <span id="perc-txt" class="text-blue-400 font-black">0%</span>
                </div>
                <div class="w-full bg-slate-800 h-4 rounded-full overflow-hidden mb-3">
                    <div id="barra-uso" class="progress-bar h-full accent-blue" style="width: 0%"></div>
                </div>
                <p id="quota-txt" class="text-slate-300 text-sm">Carregando informações...</p>
            </div>

            <!-- Botão de Upload -->
            <div class="mb-10">
                <label for="input-file" class="flex flex-col items-center justify-center glass-card border-2 border-dashed border-slate-700 rounded-3xl p-10 cursor-pointer hover:border-blue-500/50 transition-all">
                    <input type="file" id="input-file" class="hidden" onchange="arquivoSelecionado()">
                    <div class="bg-blue-500/10 p-5 rounded-full mb-4">
                        <i class="fas fa-cloud-upload-alt text-3xl text-blue-500"></i>
                    </div>
                    <span id="status-upload" class="font-bold text-slate-200 text-center">Selecionar arquivo</span>
                    <span class="text-slate-500 text-xs mt-1">PDF, ZIP, Imagens e mais</span>
                </label>
                
                <div id="upload-actions" class="hidden mt-4 space-y-3">
                    <input type="text" id="desc-file" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none" placeholder="Descrição rápida...">
                    <button onclick="enviarArquivo()" id="btn-up" class="w-full accent-blue py-3 rounded-xl font-bold shadow-lg shadow-blue-500/20">SUBIR PARA A NUVEM</button>
                </div>
            </div>

            <!-- Lista -->
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="font-black text-slate-400 text-xs uppercase tracking-widest">Meus Arquivos</h3>
                <button onclick="listarArquivos()" class="text-blue-500 text-xs font-bold hover:rotate-180 transition-all duration-500"><i class="fas fa-sync-alt"></i></button>
            </div>
            
            <div id="lista" class="space-y-3">
                <!-- Itens via JS -->
            </div>
        </main>
    </div>

    <script>
        // ENDEREÇO DO SEU SERVIDOR CONFORME PRINT
        const API = "http://blazercraft.falixsrv.me:57488";

        // Auto-login
        if(localStorage.getItem('token')) mostrarPainel();

        async function fazerLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const btn = document.getElementById('btn-login');
            const msg = document.getElementById('auth-msg');

            if(!u || !p) return;
            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', u);
                    mostrarPainel();
                } else {
                    msg.innerText = data.erro;
                    msg.style.color = "#f87171";
                }
            } catch(e) { msg.innerText = "Servidor Offline"; }
            btn.innerText = "ENTRAR";
            btn.disabled = false;
        }

        async function fazerRegistro() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(!u || !p) return alert("Preencha os campos!");

            try {
                const res = await fetch(`${API}/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                const data = await res.json();
                if(res.ok) alert("Conta criada! Pode logar.");
                else alert(data.erro);
            } catch(e) { alert("Erro de conexão"); }
        }

        function mostrarPainel() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            atualizarCota();
            listarArquivos();
        }

        function sair() {
            localStorage.clear();
            location.reload();
        }

        async function atualizarCota() {
            try {
                const res = await fetch(`${API}/user_info`, {
                    headers: {'x-access-token': localStorage.getItem('token')}
                });
                const d = await res.json();
                const mbUsado = (d.usado / (1024*1024)).toFixed(1);
                document.getElementById('quota-txt').innerText = `${mbUsado} MB usados de 500 MB`;
                document.getElementById('perc-txt').innerText = `${d.percentual}%`;
                document.getElementById('barra-uso').style.width = `${d.percentual}%`;
            } catch(e) {}
        }

        function arquivoSelecionado() {
            const input = document.getElementById('input-file');
            if(input.files[0]) {
                document.getElementById('status-upload').innerText = input.files[0].name;
                document.getElementById('upload-actions').classList.remove('hidden');
            }
        }

        async function enviarArquivo() {
            const input = document.getElementById('input-file');
            const desc = document.getElementById('desc-file').value;
            const btn = document.getElementById('btn-up');

            const fd = new FormData();
            fd.append('arquivo', input.files[0]);
            fd.append('descricao', desc);

            btn.innerText = "SUBINDO...";
            btn.disabled = true;

            try {
                const res = await fetch(`${API}/upload`, {
                    method: 'POST',
                    headers: {'x-access-token': localStorage.getItem('token')},
                    body: fd
                });
                if(res.ok) {
                    alert("Sucesso!");
                    location.reload();
                } else {
                    const d = await res.json();
                    alert(d.erro);
                }
            } catch(e) { alert("Erro no upload"); }
            btn.innerText = "SUBIR PARA A NUVEM";
            btn.disabled = false;
        }

        async function listarArquivos() {
            const container = document.getElementById('lista');
            container.innerHTML = '<p class="text-center text-slate-500 animate-pulse">Lendo arquivos...</p>';
            
            try {
                const res = await fetch(`${API}/arquivos`, {
                    headers: {'x-access-token': localStorage.getItem('token')}
                });
                const files = await res.json();
                
                if(files.length === 0) {
                    container.innerHTML = '<div class="text-center py-10 opacity-30"><i class="fas fa-folder-open text-4xl mb-2"></i><p>Nada aqui ainda</p></div>';
                    return;
                }

                container.innerHTML = "";
                files.forEach(f => {
                    const item = document.createElement('div');
                    item.className = "glass-card p-4 rounded-2xl flex items-center justify-between";
                    item.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="bg-blue-500/10 p-3 rounded-xl text-blue-500">
                                <i class="fas fa-file-alt"></i>
                            </div>
                            <div class="overflow-hidden">
                                <p class="font-bold text-sm truncate">${f.nome}</p>
                                <p class="text-[10px] text-slate-500">${f.tamanho} • ${f.data}</p>
                            </div>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="window.open('${API}/download/${f.nome}')" class="p-2 text-slate-400 hover:text-blue-500"><i class="fas fa-download"></i></button>
                            <button onclick="deletar('${f.nome}')" class="p-2 text-slate-400 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                    container.appendChild(item);
                });
            } catch(e) { container.innerHTML = "Erro ao carregar lista."; }
        }

        async function deletar(n) {
            if(!confirm("Apagar?")) return;
            await fetch(`${API}/arquivos/${n}`, {
                method: 'DELETE',
                headers: {'x-access-token': localStorage.getItem('token')}
            });
            listarArquivos();
            atualizarCota();
        }
    </script>
</body>
</html>
