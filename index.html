<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlazerCloud - Gerenciador de Arquivos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #050a15; color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-blue { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.2s; }
        .btn-blue:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px #3b82f6; }
        .hidden { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- TELA DE LOGIN / REGISTRO -->
    <div id="login-screen" class="fixed inset-0 flex items-center justify-center px-4 z-50 bg-[#050a15]">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl border border-blue-500/20 text-center">
            <h1 class="text-4xl font-extrabold text-white mb-2 italic">BLAZER<span class="text-blue-500">CLOUD</span></h1>
            <p id="auth-title" class="text-slate-500 text-sm mb-8">Acesse sua conta</p>
            
            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="text" id="user" placeholder="Usuário" class="w-full bg-slate-900 border border-slate-800 p-4 pl-12 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-white">
                </div>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="password" id="pass" placeholder="Senha" class="w-full bg-slate-900 border border-slate-800 p-4 pl-12 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-white">
                </div>
                
                <button id="btn-action" onclick="fazerLogin()" class="w-full py-4 btn-blue text-white font-bold rounded-2xl shadow-lg transition-all">Entrar no Sistema</button>
                
                <div class="pt-4 border-t border-slate-800">
                    <p class="text-xs text-slate-500 mb-4" id="toggle-text">Ainda não tem uma conta?</p>
                    <button onclick="toggleAuth()" id="btn-toggle" class="text-blue-400 font-bold text-sm hover:underline">Criar Nova Conta</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PAINEL PRINCIPAL -->
    <div id="main-content" class="hidden max-w-3xl mx-auto px-4 pt-8">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter">BLAZER<span class="text-blue-500">CLOUD</span></h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-[0.3em]">Gerenciador de Arquivos</p>
            </div>
            <button onclick="logout()" class="w-10 h-10 flex items-center justify-center rounded-full bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all">
                <i class="fas fa-power-off"></i>
            </button>
        </header>

        <!-- BARRA DE ARMAZENAMENTO -->
        <div class="glass p-5 rounded-[2rem] mb-6 border border-white/5">
            <div class="flex justify-between text-[11px] font-bold uppercase mb-3 tracking-widest text-slate-400">
                <span><i class="fas fa-database mr-2 text-blue-500"></i>Armazenamento</span>
                <span id="quota-text">Carregando...</span>
            </div>
            <div class="w-full h-3 bg-slate-900 rounded-full overflow-hidden p-[2px] border border-white/5">
                <div id="quota-bar" class="h-full bg-blue-500 rounded-full transition-all duration-1000 shadow-[0_0_15px_rgba(59,130,246,0.5)]" style="width: 0%"></div>
            </div>
        </div>

        <!-- ÁREA DE UPLOAD -->
        <section class="glass p-6 rounded-[2.5rem] mb-10 border border-white/5">
            <div class="grid grid-cols-1 gap-4 mb-4">
                <label class="border-2 border-dashed border-slate-800 rounded-2xl p-6 flex flex-col items-center justify-center cursor-pointer hover:border-blue-500 bg-slate-900/30 transition-all group">
                    <i class="fas fa-cloud-arrow-up text-3xl mb-2 text-slate-600 group-hover:text-blue-500"></i>
                    <span id="label-text" class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Selecionar Arquivo ZIP</span>
                    <input type="file" id="file-input" class="hidden" accept=".zip" onchange="atualizarNomeArquivo(this)">
                </label>
                <textarea id="file-desc" placeholder="Adicione uma descrição..." class="w-full h-20 bg-slate-900 border border-slate-800 p-4 rounded-2xl text-sm outline-none focus:ring-1 focus:ring-blue-500 resize-none text-white"></textarea>
            </div>
            <button onclick="upload()" id="btn-upload" class="w-full py-4 btn-blue text-white font-bold rounded-2xl flex items-center justify-center gap-2">
                <i class="fas fa-upload"></i> Enviar para Nuvem
            </button>
        </section>

        <!-- LISTA DE ARQUIVOS -->
        <h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-4 ml-2">Meus Arquivos</h2>
        <div id="file-list" class="space-y-4"></div>
    </div>

    <script>
        const PROXY = "https://cors-anywhere.herokuapp.com/";
        const API = "http://blazercraft.falixsrv.me:57488";
        let isRegisterMode = false;

        function atualizarNomeArquivo(input) {
            if(input.files[0]) document.getElementById('label-text').innerText = input.files[0].name;
        }

        function toggleAuth() {
            isRegisterMode = !isRegisterMode;
            const title = document.getElementById('auth-title');
            const btnAction = document.getElementById('btn-action');
            const btnToggle = document.getElementById('btn-toggle');
            const toggleText = document.getElementById('toggle-text');

            if(isRegisterMode) {
                title.innerText = "Crie sua conta gratuita";
                btnAction.innerText = "Cadastrar Agora";
                btnAction.onclick = registrar;
                btnToggle.innerText = "Já tenho uma conta";
                toggleText.innerText = "Já é membro?";
            } else {
                title.innerText = "Acesse sua conta";
                btnAction.innerText = "Entrar no Sistema";
                btnAction.onclick = fazerLogin;
                btnToggle.innerText = "Criar Nova Conta";
                toggleText.innerText = "Ainda não tem uma conta?";
            }
        }

        async function registrar() {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            if(!username || !password) return alert("Preencha tudo");
            try {
                const res = await fetch(PROXY + API + "/register", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                if(res.ok) { alert("Conta criada! Faça o login."); toggleAuth(); }
                else { const d = await res.json(); alert(d.erro); }
            } catch (e) { alert("Erro de conexão"); }
        }

        async function fazerLogin() {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            try {
                const res = await fetch(PROXY + API + "/login", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('blazer_token', data.token);
                    iniciar();
                } else alert("Incorreto");
            } catch (e) { alert("Erro de conexão"); }
        }

        async function atualizarQuota() {
            const token = localStorage.getItem('blazer_token');
            try {
                const res = await fetch(PROXY + API + "/user_info", { headers: {'x-access-token': token} });
                const info = await res.json();
                const usadoMB = (info.usado / (1024 * 1024)).toFixed(2);
                const limiteMB = (info.limite / (1024 * 1024)).toFixed(0);
                
                document.getElementById('quota-text').innerText = `${usadoMB} MB / ${limiteMB} MB`;
                const bar = document.getElementById('quota-bar');
                bar.style.width = info.percentual + '%';
                
                if(info.percentual > 90) bar.classList.replace('bg-blue-500', 'bg-red-500');
                else bar.classList.replace('bg-red-500', 'bg-blue-500');
            } catch (e) {}
        }

        async function listarArquivos() {
            const token = localStorage.getItem('blazer_token');
            const list = document.getElementById('file-list');
            try {
                const res = await fetch(PROXY + API + "/arquivos", { headers: {'x-access-token': token} });
                const dados = await res.json();
                list.innerHTML = dados.length ? '' : '<p class="text-center py-10 opacity-30 italic">Nenhum arquivo...</p>';
                dados.forEach(f => {
                    const div = document.createElement('div');
                    div.className = "glass p-5 rounded-[2rem] flex flex-col md:flex-row items-center justify-between gap-4 border border-white/5 hover:border-blue-500/30 transition-all";
                    div.innerHTML = `
                        <div class="flex items-center gap-4 flex-1 w-full">
                            <div class="w-12 h-12 bg-blue-500/10 rounded-xl flex items-center justify-center text-blue-500"><i class="fas fa-file-zipper text-xl"></i></div>
                            <div class="flex-1 truncate">
                                <h4 class="text-sm font-bold text-white truncate">${f[0]}</h4>
                                <p class="text-[10px] text-slate-500 italic truncate">${f[3]}</p>
                                <div class="flex gap-2 text-[8px] text-slate-600 font-bold uppercase mt-1"><span>${f[1]}</span><span>${f[2]}</span></div>
                            </div>
                        </div>
                        <div class="flex gap-2 w-full md:w-auto">
                            <a href="${API}/download/${f[0]}" class="flex-1 md:flex-none h-10 px-4 bg-blue-500 rounded-xl flex items-center justify-center text-xs font-bold text-white"><i class="fas fa-download mr-2"></i> Baixar</a>
                            <button onclick="deletar('${f[0]}')" class="w-10 h-10 bg-red-500/10 text-red-500 rounded-xl flex items-center justify-center hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                    list.appendChild(div);
                });
                atualizarQuota();
            } catch (e) {}
        }

        async function upload() {
            const input = document.getElementById('file-input');
            const desc = document.getElementById('file-desc').value;
            const btn = document.getElementById('btn-upload');
            const token = localStorage.getItem('blazer_token');
            
            if(!input.files[0]) return alert("Selecione um ZIP");
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> Enviando...';

            const fd = new FormData();
            fd.append('arquivo', input.files[0]);
            fd.append('descricao', desc);

            try {
                const res = await fetch(PROXY + API + "/upload", { method: 'POST', headers: {'x-access-token': token}, body: fd });
                if(!res.ok) { const e = await res.json(); alert(e.erro); }
                else { 
                    document.getElementById('file-desc').value = "";
                    document.getElementById('label-text').innerText = "Selecionar Arquivo ZIP";
                    listarArquivos(); 
                }
            } catch (e) { alert("Erro de rede"); }
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-upload"></i> Enviar para Nuvem';
        }

        async function deletar(n) {
            if(!confirm("Apagar " + n + "?")) return;
            const token = localStorage.getItem('blazer_token');
            await fetch(PROXY + API + "/arquivos/" + n, { method:'DELETE', headers:{'x-access-token': token} });
            listarArquivos();
        }

        function iniciar() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            listarArquivos();
        }

        function logout() { localStorage.removeItem('blazer_token'); location.reload(); }

        window.onload = () => { if(localStorage.getItem('blazer_token')) iniciar(); }
    </script>
</body>
</html>
